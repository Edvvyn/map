<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Premium Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --color-green: #30d158;
            --color-green-glow: rgba(48, 209, 88, 0.3);
            --color-yellow: #ffd60a;
            --color-yellow-glow: rgba(255, 214, 10, 0.3);
            --color-red: #ff453a;
            --color-red-glow: rgba(255, 69, 58, 0.3);
            --btn-gradient: linear-gradient(135deg, #ff9f0a 0%, #ff3b30 100%);
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        #map { 
            height: 100%; 
            width: 100%; 
            z-index: 1; 
            background: var(--bg-color);
        }

        .leaflet-control-attribution { display: none !important; }
        .leaflet-container { background-color: var(--bg-color) !important; }

        @keyframes zonePulse {
            0% { stroke-opacity: 0.5; fill-opacity: 0.15; transform: scale(1); }
            50% { stroke-opacity: 1; fill-opacity: 0.3; transform: scale(1.03); }
            100% { stroke-opacity: 0.5; fill-opacity: 0.15; transform: scale(1); }
        }

        .district-zone {
            transform-origin: center;
            animation: zonePulse 3s ease-in-out infinite;
            shape-rendering: geometricPrecision;
            pointer-events: none; /* Отключаем клики по визуальной зоне, ловить будет невидимая */
        }

        .center-dot {
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-sizing: border-box;
            box-shadow: 0 0 10px #ffffff, 0 0 20px inherit;
            pointer-events: none;
        }

        /* Вылетающая панель */
        #bottom-panel {
            position: fixed; 
            bottom: -110%; 
            left: 0; 
            width: 100%;
            background: var(--panel-bg);
            border-radius: 30px 30px 0 0;
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1); 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            padding: 12px 20px calc(20px + cubic-bezier(0.22, 0.61, 0.36, 1)) 20px;
            padding-bottom: calc(25px + env(safe-area-inset-bottom));
            box-sizing: border-box;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.6);
            transform: translateY(0);
            will-change: transform;
        }

        #bottom-panel.open {
            transform: translateY(-110%); 
            bottom: 0;
        }

        .panel-handle {
            width: 36px;
            height: 5px;
            background: #4a4a4c;
            border-radius: 3px;
            margin: 0 auto 20px auto;
            flex-shrink: 0;
        }

        .panel-content { display: flex; flex-direction: column; gap: 15px; }
        .panel-header-row { display: flex; justify-content: space-between; align-items: flex-start; }

        #panel-title { 
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main); margin: 0;
        }

        #panel-status { 
            font-size: 15px; font-weight: 600; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.05);
        }

        .status-many { color: var(--color-green); box-shadow: 0 0 10px var(--color-green-glow); }
        .status-few { color: var(--color-yellow); box-shadow: 0 0 10px var(--color-yellow-glow); }
        .status-none { color: var(--color-red); box-shadow: 0 0 10px var(--color-red-glow); }

        .product-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px;
        }

        .product-icon {
            font-size: 32px; width: 50px; height: 50px; background: rgba(255,255,255,0.05);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }

        .product-info { display: flex; flex-direction: column; flex-grow: 1; }
        #product-name { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        #panel-time { font-size: 13px; color: var(--text-secondary); }

        #buy-btn {
            background: var(--btn-gradient); color: #ffffff; border: none; padding: 18px 0; 
            border-radius: 16px; font-size: 16px; font-weight: 700; width: 100%;
            text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 20px rgba(255, 59, 48, 0.3);
            transition: opacity 0.2s, transform 0.1s; margin-top: 10px; outline: none; -webkit-tap-highlight-color: transparent;
        }
        #buy-btn:active { transform: scale(0.97); opacity: 0.85; }

    </style>
</head>
<body>
    
    <div id="map"></div>
    
    <div id="bottom-panel">
        <div class="panel-handle"></div>
        <div class="panel-content">
            <div class="panel-header-row">
                <h1 id="panel-title">Район</h1>
                <div id="panel-status">Статус</div>
            </div>
            <div class="product-card">
                <div class="product-icon">🎁</div>
                <div class="product-info">
                    <div id="product-name">Товар</div>
                    <div id="panel-time">🕒 Обновлено: только что</div>
                </div>
            </div>
            <button id="buy-btn">[ ЗАБРОНИРОВАТЬ И ОПЛАТИТЬ ]</button>
        </div>
    </div>

    <script>
        const ZONE_RADIUS_METERS = 150; 
        const HITBOX_RADIUS_METERS = 400; // ОГРОМНАЯ невидимая зона для уверенного тапа
        const MAP_CENTER = [55.8714, 26.5161];
        const MAP_ZOOM = 13;
        const TILE_LAYER_URL = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if (tg.setHeaderColor) tg.setHeaderColor('#121212');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#121212');

        const map = L.map('map', {
            zoomControl: false,
            tap: false, // Обязательно false для TWA
            attributionControl: false,
            dragging: true,
            preferCanvas: true 
        }).setView(MAP_CENTER, MAP_ZOOM);
        
        L.tileLayer(TILE_LAYER_URL).addTo(map);

        const panel = document.getElementById('bottom-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelStatus = document.getElementById('panel-status');
        const productName = document.getElementById('product-name');
        const buyBtn = document.getElementById('buy-btn');
        
        let currentItemsLayer = L.layerGroup().addTo(map);
        let selectedProductId = null;

        function haptic(style = 'light') {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(style);
        }

        function getZoneColors(count) {
            if (count > 5) return { main: '#30d158', class: 'status-many', text: '🟢 МНОГО' };
            if (count > 0) return { main: '#ffd60a', class: 'status-few', text: '🟡 МАЛО' };
            return { main: '#ff453a', class: 'status-none', text: '🔴 НЕТ' };
        }

        function openPanel(data, colors) {
            selectedProductId = data.id;
            panelTitle.innerText = data.district;
            productName.innerText = data.product_name;
            panelStatus.innerText = colors.text + ` (${data.count} шт.)`;
            panelStatus.className = colors.class;

            if (data.count > 0) {
                buyBtn.style.display = 'block';
            } else {
                buyBtn.style.display = 'none';
            }

            panel.classList.add('open');
            haptic('medium');
        }

        function closePanel() {
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
                selectedProductId = null;
            }
        }

        window.loadData = function(jsonData) {
            currentItemsLayer.clearLayers();

            if (!jsonData || !Array.isArray(jsonData)) return;

            jsonData.forEach(item => {
                const coords = [item.lat, item.lon];
                const colors = getZoneColors(item.count);

                // 1. Визуальная пульсирующая зона (клики игнорируются через CSS pointer-events: none)
                L.circle(coords, {
                    radius: ZONE_RADIUS_METERS,
                    color: colors.main,
                    weight: 1,
                    fillColor: colors.main,
                    fillOpacity: 0.15,
                    className: 'district-zone',
                    interactive: false 
                }).addTo(currentItemsLayer);

                // 2. Центральная точка (тоже визуальная, не интерактивная)
                const dotIcon = L.divIcon({
                    className: '',
                    html: `<div class="center-dot" style="background-color: ${colors.main}; inherit; width: 10px; height: 10px; box-shadow: 0 0 15px ${colors.main}; transform: translate(-3px, -3px);"></div>`,
                    iconSize: [0, 0]
                });
                L.marker(coords, { icon: dotIcon, interactive: false }).addTo(currentItemsLayer);

                // 3. НЕВИДИМЫЙ ЖИРНЫЙ КРУГ ДЛЯ ПАЛЬЦЕВ (Hitbox)
                const hitBox = L.circle(coords, {
                    radius: HITBOX_RADIUS_METERS,
                    color: 'transparent',
                    fillColor: 'transparent',
                    fillOpacity: 0,
                    interactive: true
                }).addTo(currentItemsLayer);

                // ИСПОЛЬЗУЕМ DOM EVENT НАПРЯМУЮ
                // Нужно дождаться добавления слоя в DOM, чтобы получить элемент
                hitBox.on('add', function() {
                    const el = hitBox.getElement(); // Достаем SVG node
                    if (el) {
                        L.DomEvent.on(el, 'touchstart mousedown', function(e) {
                            L.DomEvent.stopPropagation(e); // Жестко рубим всплытие клика
                            if (e.type === 'touchstart' && e.preventDefault) {
                                e.preventDefault(); // Предотвращаем двойной клик (ghost click) на мобилках
                            }
                            openPanel(item, colors);
                        });
                    }
                });
            });
        };

        // Логика кнопок
        buyBtn.addEventListener('click', () => {
            if (selectedProductId) {
                haptic('heavy');
                tg.sendData(JSON.stringify({ action: 'pay_order', product_id: selectedProductId }));
            }
        });

        // Закрытие панели при клике мимо (по карте)
        map.on('mousedown touchstart', (e) => {
            // Поскольку клик по hitbox останавливает всплытие (stopPropagation), 
            // сюда долетят только клики по реально пустой карте
            closePanel();
        });

        // --- ТЕСТОВЫЕ ДАННЫЕ ---
        const mockData = [
            {id: 1, district: "Центр", product_name: "Elite SKU (1g)", lat: 55.8714, lon: 26.5161, count: 12},
            {id: 2, district: "Химия", product_name: "Standard Pack (2g)", lat: 55.8895, lon: 26.5595, count: 0},
            {id: 3, district: "Новостройка", product_name: "Premium Product (0.5g)", lat: 55.8770, lon: 26.5450, count: 3}
        ];

        setTimeout(() => {
            window.loadData(mockData);
        }, 500);

    </script>
</body>
</html>
