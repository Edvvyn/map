<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Dark Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #121212; /* Темный фон */
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; /* Запрещаем прокрутку страницы */
        }
        #map { 
            height: 100vh; 
            width: 100vw; 
        }

        /* Вылетающая панель (BottomSheet) */
        #bottom-panel {
            position: fixed; 
            bottom: -150px; /* Изначально скрыта */
            left: 0; 
            width: 100%;
            background: rgba(20, 20, 20, 0.95); /* Черная панель */
            border-top: 2px solid #edaf19; 
            border-radius: 20px 20px 0 0;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        #bottom-panel.open { 
            bottom: 0; 
        }
        #panel-title { 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #edaf19; 
        }
        #panel-info { 
            font-size: 16px; 
            color: #eeeeee; 
            margin-bottom: 15px; 
        }
        #buy-btn {
            background: #edaf19; 
            color: black; 
            border: none;
            padding: 12px 30px; 
            border-radius: 10px; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer;
            text-transform: uppercase;
        }
        #buy-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="bottom-panel">
        <div id="panel-title">Район</div>
        <div id="panel-info">Информация о наличии</div>
        <button id="buy-btn">ВЫБРАТЬ РАЙОН</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        tg.ready();

        // Настройка карты Даугавпилса (скрыты кнопки зума)
        const map = L.map('map', {zoomControl: false}).setView([55.8714, 26.5161], 13);
        
        // Темная тема карты CartoDB
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Районы: Название -> [Широта, Долгота]
        const districts = {
            "Центр": [55.8714, 26.5161],
            "Химия": [55.8895, 26.5595],
            "Новостройка": [55.8770, 26.5450]
        };

        const panel = document.getElementById('bottom-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelInfo = document.getElementById('panel-info');
        const buyBtn = document.getElementById('buy-btn');
        
        let selectedDistrict = null;

        // 1. ФУНКЦИЯ ДЛЯ ЗАПРОСА ЖИВЫХ ДАННЫХ
        async function fetchStats() {
            try {
                // РАСКОММЕНТИРУЙТЕ И ЗАМЕНИТЕ НА СВОЙ URL ПОСЛЕ ЗАПУСКА СЕРВЕРА
                // const response = await fetch('URL_ТВОЕГО_СЕРВЕРА/api/stats');
                // const stats = await response.json();

                // ПОКА ЧТО ИСПОЛЬЗУЕМ ЗАГЛУШКУ для тестов:
                const stats = {"Центр": 10, "Химия": 3, "Новостройка": 0};

                updateMap(stats);
            } catch (error) {
                console.error("Ошибка при получении данных статистики:", error);
            }
        }

        // 2. ФУНКЦИЯ ОБНОВЛЕНИЯ КРУГОВ И ЦВЕТОВ
        function updateMap(stats) {
            // Очищаем старые круги с карты
            map.eachLayer(layer => { 
                if(layer instanceof L.Circle) {
                    map.removeLayer(layer); 
                }
            });

            // Отрисовываем новые круги
            for (let name in districts) {
                const count = stats[name] || 0;
                
                // Логика цвета: Зеленый (много > 5), Желтый (мало > 0), Красный (0)
                let circleColor = count > 5 ? '#4ade80' : (count > 0 ? '#facc15' : '#f87171');

                // Создаем круг с радиусом 1000 метров
                L.circle(districts[name], {
                    color: circleColor, 
                    fillColor: circleColor, 
                    fillOpacity: 0.25, 
                    weight: 2, // толщина рамки
                    radius: 1000 
                }).addTo(map).on('click', () => {
                    // Открытие панели при клике на круг
                    selectedDistrict = name;
                    panelTitle.innerText = name;
                    
                    if (count > 0) {
                        panelInfo.innerText = `В наличии: ${count} шт.`;
                        buyBtn.style.display = 'block';
                    } else {
                        panelInfo.innerText = 'В этом районе товара сейчас нет 😔';
                        buyBtn.style.display = 'none'; // Скрываем кнопку, если товара нет
                    }
                    
                    panel.classList.add('open');
                });
            }
        }

        // 3. ОТПРАВКА ДАННЫХ В ТЕЛЕГРАМ БОТ
        buyBtn.addEventListener('click', () => {
            if (selectedDistrict) {
                // Отправляем название района боту
                tg.sendData(selectedDistrict);
            }
        });

        // Скрытие панели при клике по пустой области карты
        map.on('click', () => { 
            panel.classList.remove('open'); 
            selectedDistrict = null;
        });

        // Запрашиваем данные при старте
        fetchStats();
        // Запускаем обновление каждые 10 секунд (10000 мс)
        setInterval(fetchStats, 10000);

    </script>
</body>
</html>
