<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Premium Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --accent-gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --handle-color: #3a3a3c;
            
            /* Цвета статусов (неон) */
            --clr-many: #00ff88;
            --clr-few: #ffcc00;
            --clr-none: #ff3b30;
        }

        body { 
            margin: 0; 
            padding: 0; 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #map { 
            height: 100vh; 
            width: 100vw; 
            z-index: 1; 
            background: var(--bg-color);
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: opacity 0.3s ease;
        }

        /* Убираем лишний интерфейс карты */
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }

        /* ========================================= */
        /* 1. ВИЗУАЛ: Зоны и Анимация              */
        /* ========================================= */

        @keyframes pulse-zone {
            0% { stroke-opacity: 0.5; fill-opacity: 0.15; transform: scale(1); }
            50% { stroke-opacity: 0.1; fill-opacity: 0.05; transform: scale(1.03); }
            100% { stroke-opacity: 0.5; fill-opacity: 0.15; transform: scale(1); }
        }

        .leaflet-interactive.pulsating-zone {
            animation: pulse-zone 3s infinite ease-in-out;
            transform-origin: center;
            pointer-events: auto !important;
        }

        /* ========================================= */
        /* 2. ИНТЕРФЕЙС ПАНЕЛИ (Bottom Sheet)     */
        /* ========================================= */
        #bottom-panel {
            position: fixed; 
            bottom: -100%;
            left: 0; 
            width: 100%;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px 30px 0 0;
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            padding: 10px 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            box-sizing: border-box;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            transform: translateY(0);
        }

        #bottom-panel.open {
            transform: translateY(-100%);
            bottom: 0;
        }

        .panel-handle {
            width: 36px;
            height: 5px;
            background: var(--handle-color);
            border-radius: 3px;
            margin: 0 auto 15px auto;
            flex-shrink: 0;
        }

        .panel-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        #panel-title { 
            font-size: 24px; 
            font-weight: 800; 
            margin: 0;
            color: var(--text-main); 
            letter-spacing: -0.5px;
        }

        #panel-status { 
            font-size: 14px; 
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-img {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        #panel-product-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        #panel-type {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #panel-price {
            font-size: 18px;
            font-weight: 800;
            color: #ffcc00; 
        }

        .panel-alert-text {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.4;
            margin-top: 2px;
            margin-bottom: 5px;
        }

        #buy-btn {
            background: var(--accent-gold);
            color: #000000; 
            border: none;
            padding: 18px 0; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(253, 160, 133, 0.4); 
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #buy-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
            box-shadow: 0 0 10px rgba(253, 160, 133, 0.2);
        }
        
        #buy-btn:disabled {
            background: #3a3a3c;
            color: #8e8e93;
            box-shadow: none;
            cursor: not-allowed;
        }

    </style>
</head>
<body>

    <!-- Экран загрузки -->
    <div id="loading-screen">Загрузка данных...</div>
    
    <div id="map"></div>
    
    <div id="bottom-panel">
        <div class="panel-handle"></div>
        
        <div class="panel-content">
            <div class="panel-header">
                <h1 id="panel-title">Район</h1>
                <div id="panel-status">Статус</div>
            </div>

            <div class="product-card">
                <div class="product-img">🎁</div>
                <div class="product-info">
                    <div id="panel-product-name">Название товара</div>
                    <div id="panel-type">Классика • 1г</div>
                </div>
                <div id="panel-price">0 €</div>
            </div>
            
            <div class="panel-alert-text">
                📍 Точное местоположение и фото-инструкция будут доступны в чате сразу после оплаты
            </div>
            
            <button id="buy-btn">[ ЗАБРОНИРОВАТЬ И ОПЛАТИТЬ ]</button>
        </div>
    </div>

    <script>
        // =========================================
        // 1. Инициализация Telegram WebApp
        // =========================================
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        if (tg.setHeaderColor) tg.setHeaderColor('#121212');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#121212');

        // =========================================
        // 2. Инициализация карты
        // =========================================
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false,
            tap: false, // Отключаем стандартный tap Leaflet (критично для Telegram)
            dragging: true,
            zoomAnimation: true,
            fadeAnimation: true
        }).setView([55.8714, 26.5161], 13); 
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        const itemsLayerGroup = L.layerGroup().addTo(map);

        // Элементы DOM
        const loadingScreen = document.getElementById('loading-screen');
        const panel = document.getElementById('bottom-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelStatus = document.getElementById('panel-status');
        const panelProdName = document.getElementById('panel-product-name');
        const panelPrice = document.getElementById('panel-price');
        const buyBtn = document.getElementById('buy-btn');
        
        let currentSelectedItemId = null; 

        // Глобальные переменные цветов
        const style = getComputedStyle(document.documentElement);
        const colorMany = style.getPropertyValue('--clr-many').trim();
        const colorFew = style.getPropertyValue('--clr-few').trim();
        const colorNone = style.getPropertyValue('--clr-none').trim();

        // =========================================
        // 3. ФУНКЦИИ ОТРИСОВКИ И ЛОГИКИ
        // =========================================

        function getStatusColor(count) {
            if (count > 5) return colorMany;
            if (count > 0) return colorFew;
            return colorNone;
        }

        function getStatusText(count) {
            if (count > 0) return `🟢 В наличии: ${count} шт.`;
            return `🔴 Нет в наличии`;
        }

        // Открытие панели с данными и центрирование карты
        function openProductPanel(itemData) {
            currentSelectedItemId = itemData.id;
            
            map.flyTo([itemData.lat, itemData.lon], map.getZoom(), {
                animate: true,
                duration: 0.8
            });

            panelTitle.innerText = itemData.district;
            panelProdName.innerText = itemData.product_name;
            panelPrice.innerText = itemData.price ? `${itemData.price} €` : `0 €`; 
            
            const color = getStatusColor(itemData.count);
            panelStatus.innerText = getStatusText(itemData.count);
            panelStatus.style.color = color;
            panelStatus.style.border = `1px solid ${color}`;

            if (itemData.count > 0) {
                buyBtn.disabled = false;
                buyBtn.innerText = "[ ЗАБРОНИРОВАТЬ И ОПЛАТИТЬ ]";
            } else {
                buyBtn.disabled = true;
                buyBtn.innerText = "НЕДОСТУПНО";
            }

            panel.classList.add('open');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function closePanel() {
            panel.classList.remove('open');
            currentSelectedItemId = null;
        }

        // =========================================
        // 4. ДАННЫЕ И СВЯЗЬ (loadData)
        // =========================================

        window.loadData = function(jsonData) {
            itemsLayerGroup.clearLayers(); 

            if (!jsonData || !Array.isArray(jsonData) || jsonData.length === 0) {
                loadingScreen.innerText = "Нет доступных районов";
                return;
            }

            jsonData.forEach(item => {
                const pos = [item.lat, item.lon];
                const color = getStatusColor(item.count);

                // 1. Создаем ТОЛЬКО визуальную пульсирующую зону (туман).
                const zoneCircle = L.circle(pos, {
                    radius: 150, 
                    color: color,        
                    weight: 2,
                    fillColor: color,    
                    fillOpacity: 0.15,
                    className: 'pulsating-zone', 
                    interactive: false   
                });

                // 2. Невидимый интерактивный слой поверх (радиус 200м для удобства тапа)
                const touchLayer = L.circle(pos, {
                    radius: 200, 
                    color: 'transparent',
                    fillColor: 'transparent',
                    fillOpacity: 0,
                    interactive: true,
                    className: 'clickable-fix'
                });

                touchLayer.on('add', function() {
                    const el = this._path; 
                    if (!el) return;
                    
                    L.DomEvent.on(el, 'touchstart mousedown', function(e) {
                        L.DomEvent.stop(e); 
                        openProductPanel(item);
                    });
                });

                zoneCircle.addTo(itemsLayerGroup);
                touchLayer.addTo(itemsLayerGroup);
            });

            // Прячем экран загрузки после успешного рендера
            loadingScreen.style.opacity = '0';
            setTimeout(() => { loadingScreen.style.display = 'none'; }, 300);
        };

        // =========================================
        // 5. ОБРАБОТЧИКИ СОБЫТИЙ И ПАРСИНГ HASH
        // =========================================

        map.on('mousedown touchstart', function() {
            if (panel.classList.contains('open')) {
                closePanel();
            }
        });

        buyBtn.addEventListener('click', () => {
            if (currentSelectedItemId && tg.sendData) {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                
                tg.sendData(JSON.stringify({
                    action: "pay",
                    product_id: currentSelectedItemId
                }));
            }
        });

        // ПАРСИНГ ДАННЫХ ИЗ URL ПРИ СТАРТЕ
        document.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            
            if (hash && hash.startsWith('#data=')) {
                try {
                    // Отрезаем '#data='
                    const base64Data = hash.substring(6);
                    
                    // Безопасное декодирование Base64 (поддерживает кириллицу/UTF-8)
                    const decodedStr = decodeURIComponent(escape(window.atob(base64Data)));
                    const parsedData = JSON.parse(decodedStr);
                    
                    // Запускаем отрисовку
                    window.loadData(parsedData);
                } catch (e) {
                    console.error("Ошибка парсинга данных:", e);
                    loadingScreen.innerText = "Ошибка чтения данных";
                }
            } else {
                loadingScreen.innerText = "Ожидание данных от бота...";
            }
        });

    </script>
</body>
</html>
