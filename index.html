<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Dark Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
 
        /* Вылетающая панель */
        #bottom-panel {
            position: fixed; 
            bottom: -250px; /* Спрятана */
            left: 0; 
            width: 100%;
            background: #1e1e1e; 
            border-top: 3px solid #edaf19; 
            border-radius: 20px 20px 0 0;
            transition: bottom 0.3s ease; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 0 40px 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
        }
 
        #panel-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #edaf19; }
        #panel-info { font-size: 16px; color: #bbb; margin-bottom: 20px; }
 
        #buy-btn {
            background: #edaf19; color: #000; border: none;
            padding: 15px 45px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; 
            text-transform: uppercase;
        }
        .leaflet-control-attribution { display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
 
    <div id="bottom-panel" id="panel_obj">
        <div id="panel-title">Район</div>
        <div id="panel-info">Информация</div>
        <button id="buy-btn">ВЫБРАТЬ РАЙОН</button>
    </div>
 
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
 
        // Инициализация карты
        const map = L.map('map', {
            zoomControl: false,
            tap: false, 
            dragging: true
        }).setView([55.8714, 26.5161], 13);
 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
 
        const districts = {
            "Центр": [55.8714, 26.5161],
            "Химия": [55.8895, 26.5595],
            "Новостройка": [55.8770, 26.5450]
        };
 
        // ТУТ МЕНЯЙ ЦИФРЫ (Количество товара)
        const stats = {
            "Центр": 10, 
            "Химия": 0, 
            "Новостройка": 2
        };
 
        const panel = document.getElementById('bottom-panel');
        const buyBtn = document.getElementById('buy-btn');
        let selectedDistrict = null;
 
        for (let name in districts) {
            const count = stats[name] || 0;
            let color = count > 5 ? '#4ade80' : (count > 0 ? '#facc15' : '#f87171');
 
            const circle = L.circle(districts[name], {
                color: color, 
                fillColor: color, 
                fillOpacity: 0.4, 
                weight: 2,
                radius: 1000 
            }).addTo(map);
 
            // ФУНКЦИЯ ОТКРЫТИЯ
            const openMe = (e) => {
                L.DomEvent.stopPropagation(e);
                selectedDistrict = name;
                document.getElementById('panel-title').innerText = name;
                document.getElementById('panel-info').innerText = count > 0 ? "В наличии: " + count + " шт." : "Товара нет 😔";
 
                buyBtn.style.display = count > 0 ? 'block' : 'none';
                panel.style.bottom = "0px"; // ВЫЕЗЖАЕТ
 
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            };
 
            // Вешаем на все типы нажатий
            circle.on('click', openMe);
            circle.on('mousedown', openMe);
        }
 
        buyBtn.addEventListener('click', () => {
            if (selectedDistrict) {
                tg.sendData(selectedDistrict);
            }
        });
 
        // Закрытие при клике на карту
        map.on('mousedown touchstart click', () => { 
            panel.style.bottom = "-250px"; 
        });
 
    </script>
</body>
</html>
