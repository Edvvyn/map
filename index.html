<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Premium Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1c1c1e;
            --text-main: #ffffff;
            --btn-gradient: linear-gradient(135deg, #ff9f0a 0%, #ff3b30 100%);
        }
        body, html { margin: 0; padding: 0; background: var(--bg-color); height: 100vh; overflow: hidden; font-family: sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
 
        /* Панель */
        #bottom-panel {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: var(--panel-bg); border-radius: 25px 25px 0 0;
            transition: bottom 0.4s ease; z-index: 10000;
            padding: 20px; box-sizing: border-box; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
        }
        #panel-title { font-size: 22px; font-weight: bold; margin: 0; color: #ff9f0a; }
        #product-name { font-size: 18px; color: #ccc; }
        #buy-btn {
            background: var(--btn-gradient); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px;
        }
        .panel-handle { width: 40px; height: 4px; background: #555; border-radius: 2px; margin: 0 auto 10px auto; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="bottom-panel">
        <div class="panel-handle"></div>
        <h1 id="panel-title">Район</h1>
        <div id="product-name">Товар</div>
        <div id="panel-status" style="color: #8e8e93;">🕒 Обновлено: только что</div>
        <button id="buy-btn">ЗАБРОНИРОВАТЬ</button>
    </div>
 
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
 
        // 1. Инициализация карты
        const map = L.map('map', { zoomControl: false, tap: false }).setView([55.8714, 26.5161], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
 
        // 2. Слой для невидимых кнопок (Бетонный метод)
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5000;';
        document.body.appendChild(overlay);
 
        const panel = document.getElementById('bottom-panel');
        let selectedId = null;
 
        function openPanel(item) {
            selectedId = item.id;
            document.getElementById('panel-title').innerText = item.district;
            document.getElementById('product-name').innerText = item.product_name;
            panel.style.bottom = "0";
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
 
        function closePanel() { panel.style.bottom = "-110%"; }
 
        // 3. Функция отрисовки зон
        window.loadData = function(data) {
            overlay.innerHTML = ''; 
            data.forEach(item => {
                const color = item.count > 0 ? '#30d158' : '#ff453a';
 
                // Визуал на карте
                L.circle([item.lat, item.lon], { radius: 200, color: color, fillOpacity: 0.3, interactive: false }).addTo(map);
 
                // Создаем кнопку-невидимку
                const btn = document.createElement('div');
                btn.style.cssText = 'position:absolute; width:80px; height:80px; pointer-events:auto; cursor:pointer;';
                // btn.style.background = 'rgba(255,0,0,0.3)'; // РАСКОММЕНТИРУЙ ЭТО ДЛЯ ТЕСТА (увидишь зоны клика красным)
                overlay.appendChild(btn);
 
                const update = () => {
                    const p = map.latLngToContainerPoint([item.lat, item.lon]);
                    btn.style.left = (p.x - 40) + 'px'; btn.style.top = (p.y - 40) + 'px';
                };
                map.on('move zoom viewreset', update);
                update();
 
                // Клик/Тап
                btn.onclick = (e) => { e.stopPropagation(); openPanel(item); };
                btn.ontouchstart = (e) => { e.stopPropagation(); openPanel(item); };
            });
        };
 
        // ТЕСТОВЫЕ ДАННЫЕ
        const mock = [
            {id: 1, district: "Центр", product_name: "Elite SKU", lat: 55.8714, lon: 26.5161, count: 10},
            {id: 2, district: "Химия", product_name: "Standard", lat: 55.8895, lon: 26.5595, count: 0},
            {id: 3, district: "Новостройка", product_name: "Premium", lat: 55.8770, lon: 26.5450, count: 5}
        ];
 
        setTimeout(() => { loadData(mock); }, 500);
 
        map.on('mousedown touchstart', () => { closePanel(); });
        document.getElementById('buy-btn').onclick = () => {
            if(selectedId) tg.sendData(JSON.stringify({action: 'buy', id: selectedId}));
        };
    </script>
</body>
</html>
