<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Dark Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #121212; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }
        #map { 
            height: 100vh; 
            width: 100vw; 
            z-index: 1; 
        }

        /* Убираем копирайт Leaflet для чистоты */
        .leaflet-control-attribution { display: none !important; }

        /* Кастомные стили для маркеров (свечение и пульсация) */
        .neon-marker {
            border-radius: 50%;
            border: 2px solid #ffffff;
            transition: all 0.3s ease;
        }
        
        .pulse {
            animation: pulsate 1.5s ease-out;
            animation-iteration-count: infinite;
        }

        @keyframes pulsate {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }

        /* Вылетающая панель (BottomSheet) */
        #bottom-panel {
            position: fixed; 
            bottom: -300px; /* Изначально спрятана */
            left: 0; 
            width: 100%;
            background: #1c1c1e; /* Темный фон iOS-style */
            border-radius: 25px 25px 0 0;
            transition: bottom 0.3s cubic-bezier(0.32, 0.72, 0, 1); /* Плавный вылет */
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            padding: 10px 20px 30px 20px;
            box-sizing: border-box;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        /* Серая полоска сверху (handle) */
        .panel-handle {
            width: 40px;
            height: 5px;
            background: #4a4a4c;
            border-radius: 3px;
            margin: 0 auto 15px auto;
        }

        #panel-title { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 8px; 
            color: #ffffff; 
        }

        .status-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        #panel-status { 
            font-size: 16px; 
            font-weight: 500;
            margin-bottom: 4px;
        }

        #panel-time {
            font-size: 13px;
            color: #8e8e93; /* Цвет вторичного текста iOS */
        }

        #buy-btn {
            background: linear-gradient(135deg, #edaf19 0%, #d49a12 100%);
            color: #121212; 
            border: none;
            padding: 16px 0; 
            border-radius: 15px; 
            font-size: 17px; 
            font-weight: 700; 
            width: 100%;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(237, 175, 25, 0.3);
            transition: opacity 0.2s, transform 0.1s;
        }

        #buy-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="bottom-panel">
        <div class="panel-handle"></div>
        <div id="panel-title">Район</div>
        <div class="status-row">
            <div id="panel-status">Статус</div>
            <div id="panel-time">🕒 Обновлено: только что</div>
        </div>
        <button id="buy-btn">ВЫБРАТЬ РАЙОН</button>
    </div>

    <script>
        // 1. Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Настройка цвета хедера TWA под стиль панели
        if (tg.setHeaderColor) {
            tg.setHeaderColor('#121212');
        }

        // 2. Инициализация карты
        const map = L.map('map', {
            zoomControl: false,
            tap: false,       // Критично для TWA
            dragging: true
        }).setView([55.8714, 26.5161], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Базы данных (в будущем заменишь на fetch)
        const districts = {
            "Центр": [55.8714, 26.5161],
            "Химия": [55.8895, 26.5595],
            "Новостройка": [55.8770, 26.5450]
        };

        const stats = {
            "Центр": 10, 
            "Химия": 0, 
            "Новостройка": 2
        };

        const panel = document.getElementById('bottom-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelStatus = document.getElementById('panel-status');
        const buyBtn = document.getElementById('buy-btn');
        let selectedDistrict = null;

        // 3. Отрисовка маркеров и невидимых зон
        for (let name in districts) {
            const count = stats[name] || 0;
            
            // Логика цветов
            let hexColor = count > 5 ? '#34c759' : (count > 0 ? '#ffcc00' : '#ff3b30'); // Цвета в стиле iOS
            let isPulsing = count > 5 ? 'pulse' : '';

            // Создаем кастомный HTML-маркер для эффекта свечения и пульсации
            const customIcon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="neon-marker ${isPulsing}" style="
                        background-color: ${hexColor}; 
                        width: 20px; 
                        height: 20px; 
                        box-shadow: 0 0 15px ${hexColor};
                        margin-top: -10px;
                        margin-left: -10px;
                      "></div>`,
                iconSize: [0, 0] // Размер задается внутри HTML
            });

            // Добавляем видимый маркер
            L.marker(districts[name], { icon: customIcon }).addTo(map);

            // Создаем невидимый круг вокруг маркера для увеличения области клика (радиус 1500м)
            const clickArea = L.circle(districts[name], {
                color: 'transparent', 
                fillColor: 'transparent', 
                fillOpacity: 0, 
                radius: 1500,
                interactive: true 
            }).addTo(map);

            // Обработчик клика (вешаем на невидимую область)
            const openPanel = (e) => {
                L.DomEvent.stopPropagation(e);
                
                selectedDistrict = name;
                panelTitle.innerText = name;
                
                if (count > 0) {
                    panelStatus.innerHTML = `<span style="color: #34c759;">🟢 В наличии: ${count} шт.</span>`;
                    buyBtn.style.display = 'block';
                } else {
                    panelStatus.innerHTML = `<span style="color: #ff3b30;">🔴 Ожидается завоз</span>`;
                    buyBtn.style.display = 'none';
                }

                // Выезд панели
                panel.style.bottom = "0px";

                // Легкая вибрация
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            };

            // Вешаем события для мобильных и ПК на невидимую зону
            clickArea.on('mousedown touchstart click', openPanel);
        }

        // 4. Логика кнопок и скрытия
        buyBtn.addEventListener('click', () => {
            if (selectedDistrict) {
                // Вибрация при успешном выборе
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                tg.sendData(selectedDistrict);
            }
        });

        // Скрытие панели при тапе по пустой карте
        map.on('mousedown touchstart click', () => { 
            panel.style.bottom = "-300px"; 
            selectedDistrict = null;
        });

    </script>
</body>
</html>
