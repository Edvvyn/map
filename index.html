<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Daugavpils Dark Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        #map { 
            height: 100vh; 
            width: 100vw; 
        }

        /* Вылетающая панель */
        #bottom-panel {
            position: fixed; 
            bottom: -200px; /* Спрятана по умолчанию */
            left: 0; 
            width: 100%;
            background: rgba(25, 25, 25, 0.98); 
            border-top: 2px solid #edaf19; 
            border-radius: 20px 20px 0 0;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; /* Поверх элементов Leaflet */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 25px 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        #bottom-panel.open { 
            bottom: 0; /* Вылет панели */
        }
        #panel-title { 
            font-size: 24px; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #edaf19; 
        }
        #panel-info { 
            font-size: 16px; 
            color: #ccc; 
            margin-bottom: 20px; 
            text-align: center;
            padding: 0 20px;
        }
        #buy-btn {
            background: #edaf19; 
            color: #000; 
            border: none;
            padding: 14px 35px; 
            border-radius: 12px; 
            font-size: 16px;
            font-weight: 900; 
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s;
        }
        #buy-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="bottom-panel">
        <div id="panel-title">Район</div>
        <div id="panel-info">Информация</div>
        <button id="buy-btn">ВЫБРАТЬ РАЙОН</button>
    </div>

    <script>
        // 1. Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 2. Инициализация карты (ВАЖНО ДЛЯ МОБИЛОК: tap: false, dragging: true)
        const map = L.map('map', {
            zoomControl: false,
            tap: false,       // Отключаем встроенную обработку тапов Leaflet (чинит клики в TWA)
            dragging: true    // Разрешаем перетаскивание карты
        }).setView([55.8714, 26.5161], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const districts = {
            "Центр": [55.8714, 26.5161],
            "Химия": [55.8895, 26.5595],
            "Новостройка": [55.8770, 26.5450]
        };

        const panel = document.getElementById('bottom-panel');
        const panelTitle = document.getElementById('panel-title');
        const panelInfo = document.getElementById('panel-info');
        const buyBtn = document.getElementById('buy-btn');
        let selectedDistrict = null;

        // Эмуляция данных с сервера
        const stats = {"Центр": 10, "Химия": 0, "Новостройка": 2};

        // 3. Отрисовка кругов
        for (let name in districts) {
            const count = stats[name] || 0;
            let circleColor = count > 5 ? '#4ade80' : (count > 0 ? '#facc15' : '#f87171');

            const circle = L.circle(districts[name], {
                color: circleColor, 
                fillColor: circleColor, 
                fillOpacity: 0.3, 
                weight: 2,
                radius: 1000 // Строго 1000 метров
            }).addTo(map);

            // Обработчики для мобильных устройств и ПК
            circle.on('mousedown touchstart click', function(e) {
                // Останавливаем событие, чтобы карта не считала это кликом по фону
                L.DomEvent.stopPropagation(e);

                selectedDistrict = name;
                panelTitle.innerText = name;
                
                if (count > 0) {
                    panelInfo.innerText = `В наличии: ${count} шт.`;
                    buyBtn.style.display = 'block'; // Показываем кнопку
                } else {
                    panelInfo.innerText = 'Товара нет в наличии 😔';
                    buyBtn.style.display = 'none';  // Скрываем кнопку
                }
                
                panel.classList.add('open');
            });
        }

        // 4. Отправка данных в бота
        buyBtn.addEventListener('click', () => {
            if (selectedDistrict) {
                tg.sendData(selectedDistrict);
            }
        });

        // 5. Закрытие панели при клике/тапе в любое другое место карты
        map.on('mousedown touchstart click', () => { 
            panel.classList.remove('open'); 
            selectedDistrict = null;
        });

    </script>
</body>
</html>
